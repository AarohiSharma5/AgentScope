# Alembic configuration for the AgentScope backend.
#
# The database URL is intentionally NOT set here; ``migrations/env.py`` derives
# it from the application config (``DATABASE_URL`` / .env), so migrations always
# target the same database the app uses. Run from the ``backend/`` directory:
#
#     alembic upgrade head            # apply all migrations
#     alembic revision --autogenerate -m "describe change"
#     alembic downgrade -1            # roll back one revision

[alembic]
script_location = migrations
prepend_sys_path = .
# Use OS-native path separators for version files.
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
