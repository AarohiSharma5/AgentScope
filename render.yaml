# Render Blueprint for a FREE, public, read-only AgentScope demo.
#
# One-time setup after connecting this repo as a Blueprint in Render:
#   1. Create a free Postgres elsewhere (Neon / Supabase — Render's free DB
#      expires after 90 days) and copy its connection string.
#   2. In the Render dashboard set the values marked `sync: false` below:
#        agentscope-demo-api:  DATABASE_URL, CORS_ORIGINS
#        agentscope-demo-web:  VITE_API_BASE_URL
#      (You'll know the service URLs after the first deploy; set CORS_ORIGINS to
#       the web URL and VITE_API_BASE_URL to the api URL + "/api", then redeploy.)
#
# Notes
#  * Free web services spin down when idle; the first request after that wakes
#    them (~30–50s). Seeding runs in the *background* (see start.sh), so the wake
#    is fast regardless of DB size and the health check never times out.
#  * DEMO_RESET_ON_BOOT is "false": on boot we only seed what's missing (a fresh
#    DB gets the full dataset once; a warm DB tops up just the fast analytics
#    history if absent, then persists). Set it to "true" only for a one-off full
#    rebuild — it wipes and reseeds everything, which is slow over a networked DB.
#  * The API runs a single threaded worker on purpose (in-process live-stream
#    hub); no Redis needed for a demo.

services:
  # --- Backend API (Flask + gunicorn, via the existing Dockerfile) ---
  - type: web
    name: agentscope-demo-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    # Start the server immediately and seed in the background. Delegated to
    # start.sh so the platform command stays a simple, unambiguous invocation (no
    # inline shell operators/quoting — that previously made Render exit 127
    # "not found"), and so the slow seed can't block the health check.
    dockerCommand: sh start.sh
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: DEMO_RESET_ON_BOOT
        value: "false"
      - key: DATABASE_URL
        sync: false # paste your Neon/Supabase Postgres URL in the dashboard
      - key: CORS_ORIGINS
        sync: false # the web URL, e.g. https://agentscope-demo-web.onrender.com

  # --- Frontend (static Vite build served by Render's CDN) ---
  - type: web
    name: agentscope-demo-web
    runtime: static
    rootDir: ./frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_DEMO_MODE
        value: "true"
      - key: VITE_API_BASE_URL
        sync: false # the api URL + /api, e.g. https://agentscope-demo-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
